{% extends 'mini_insta/base.html' %}

{% block content %}
<div>
    <h1>Login</h1>
    <form action="{% url 'mini_insta:login' %}" method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="hidden" name="next" value="{% url 'mini_insta:show_all_profiles' %}">
        <input type="submit" value="Login">
    </form>
</div>
{% endblock %}
