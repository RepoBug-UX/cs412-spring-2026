{% load static %}
<html>
    <head>
        <title>Mini Instagram</title>
    </head>
    <body>

    <nav>
        <a href="{% url 'mini_insta:show_all_profiles' %}">All Profiles</a>
        {% if request.user.is_authenticated %}
        | <a href="{% url 'mini_insta:show_my_profile' %}">My Profile</a>
        | <a href="{% url 'mini_insta:show_feed' %}">My Feed</a>
        | <a href="{% url 'mini_insta:create_post' %}">Create Post</a>
        | <a href="{% url 'mini_insta:search' %}">Search</a>
        | <form action="{% url 'mini_insta:logout' %}" method="POST" style="display:inline">
            {% csrf_token %}
            <button type="submit">Logout ({{ request.user.username }})</button>
          </form>
        {% else %}
        | <a href="{% url 'mini_insta:login' %}">Login</a>
        | <a href="{% url 'mini_insta:create_profile' %}">Create Account</a>
        {% endif %}
    </nav>

    {% block content %}
    {% endblock %}

    </body>
</html>
