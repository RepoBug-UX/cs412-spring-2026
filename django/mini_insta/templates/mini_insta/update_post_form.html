{% extends 'mini_insta/base.html' %}

{% block content %}
<div>
    <h1>Update Post</h1>
    <form action="{% url 'mini_insta:update_post' post.pk %}" method="POST">
        {% csrf_token %}

        <p>Caption:<br>
        {{ form.caption }}</p>

        <input type="submit" value="Update">
        <a href="{% url 'mini_insta:show_post' post.pk %}">Cancel</a>
    </form>
</div>
{% endblock %}
