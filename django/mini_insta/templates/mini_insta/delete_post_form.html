{% extends 'mini_insta/base.html' %}

{% block content %}
<div>
    <h1>Delete Post</h1>
    <p>Are you sure you want to delete this post by {{ post.profile.display_name }}?</p>
    <p><strong>Caption:</strong> {{ post.caption }}</p>
    <p><strong>Posted:</strong> {{ post.timestamp }}</p>

    <form action="{% url 'mini_insta:delete_post' post.pk %}" method="POST">
        {% csrf_token %}
        <input type="submit" value="Yes, delete">
    </form>

    <form action="{% url 'mini_insta:show_profile' profile.pk %}" method="GET">
        <input type="submit" value="Cancel">
    </form>
</div>
{% endblock %}
